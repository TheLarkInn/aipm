# Valid aipm.toml with [package], [dependencies], and [workspace.lints].
# Verifies that having non-lints sections alongside [workspace.lints] is allowed.

[package]
name = "my-plugin"
version = "0.2.0"
type = "composite"
description = "A plugin with dependencies and lint config."

[dependencies]
"some-skill" = "1.0.0"
"another-skill" = { version = "2.0.0", optional = true }

[workspace.lints]
"skill/missing-description" = "allow"
"hook/legacy-event-name" = { level = "error", ignore = ["legacy/**"] }

[workspace.lints.ignore]
paths = ["examples/**"]

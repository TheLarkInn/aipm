[workspace]
# Use git-cliff for changelog formatting
changelog_config = "cliff.toml"

# Update CHANGELOG.md on release
changelog_update = true

# Create git tags when releasing
git_tag_enable = true

# Do NOT create GitHub Releases — the release.yml workflow handles that
git_release_enable = false

# Run cargo-semver-checks to detect API breaking changes and auto-calculate semver
# - New public types/functions/methods → minor bump
# - Breaking API changes → major bump (or minor pre-1.0)
# - Everything else → patch bump
semver_check = true

# Publish crates to crates.io via cargo publish
publish_allow_dirty = false

# Create release PRs as non-draft and auto-merge via squash after CI passes
pr_draft = false
pr_auto_merge = "squash"

# Require clean working directory
allow_dirty = false

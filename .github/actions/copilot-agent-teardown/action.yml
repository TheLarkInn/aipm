name: "Teardown Copilot Agent"
description: >
  Stops the MCP gateway container, appends the agent step summary, prints the
  AWF firewall summary, and uploads debug artifacts. Reusable across any Copilot
  agentic workflow.

inputs:
  run_id:
    description: "github.run_id — used as a unique suffix on the artifact name"
    required: true
  artifact_name:
    description: "Prefix for the uploaded debug artifact"
    default: "agent-run"
  artifact_retention_days:
    description: "How many days to retain the debug artifact"
    default: "7"

runs:
  using: composite
  steps:
    - name: Stop MCP gateway
      shell: bash
      run: docker stop mcp-gateway && docker rm mcp-gateway 2>/dev/null || true

    - name: Append agent summary to job summary
      shell: bash
      run: |
        if [ -f /tmp/gh-aw/agent-step-summary.md ]; then
          cat /tmp/gh-aw/agent-step-summary.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Print AWF firewall summary
      shell: bash
      run: |
        sudo chmod -R a+r /tmp/gh-aw/firewall-logs 2>/dev/null || true
        if command -v awf &>/dev/null; then
          awf logs summary | tee -a "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload debug artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}-${{ inputs.run_id }}
        retention-days: ${{ inputs.artifact_retention_days }}
        if-no-files-found: ignore
        path: |
          /tmp/gh-aw/agent-stdio.log
          /tmp/gh-aw/agent-logs/
          /tmp/gh-aw/mcp-logs/
          /tmp/gh-aw/firewall-logs/

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format
        run: cargo fmt --check

  coverage:
    name: Coverage (90% branch gate)
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: actions/setup-node@v4
        with:
          node-version: '22.6.0'

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Clean coverage artifacts
        run: cargo llvm-cov clean --workspace

      - name: Run all tests with branch coverage
        run: cargo llvm-cov --no-report --workspace --branch

      - name: Run doctests with branch coverage
        run: cargo llvm-cov --no-report --doc --branch

      - name: Generate lcov report
        run: >
          cargo llvm-cov report --doctests --branch
          --ignore-filename-regex '(tests/|research/|specs/)'
          --lcov --output-path lcov.info

      - name: Enforce 90% branch coverage
        run: |
          OUTPUT=$(cargo llvm-cov report --doctests --branch \
            --ignore-filename-regex '(tests/|research/|specs/)' 2>&1)
          echo "$OUTPUT"
          BRANCH_PCT=$(echo "$OUTPUT" | grep '^TOTAL' | awk '{print $NF}' | tr -d '%')
          if [ -z "$BRANCH_PCT" ]; then
            echo "::error::Could not parse branch coverage percentage"
            exit 1
          fi
          echo "Branch coverage: ${BRANCH_PCT}%"
          if [ "$(echo "$BRANCH_PCT < 90" | bc -l)" -eq 1 ]; then
            echo "::error::Branch coverage ${BRANCH_PCT}% is below 90% threshold"
            exit 1
          fi

      - name: Upload to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: false

name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

jobs:
  # Job 1: Create/update a release PR with version bumps + CHANGELOG
  # cargo-semver-checks determines the version bump from API changes
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Create/update release PR
        id: release_plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Enable auto-merge on release PRs
        if: steps.release_plz.outputs.prs_created != '[]'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          PRS_CREATED: ${{ steps.release_plz.outputs.prs_created }}
        run: |
          echo "$PRS_CREATED" | jq -r '.[].number' | while read -r pr; do
            gh pr merge "$pr" --auto --squash
          done

  # Job 2: Publish to crates.io + create git tag when release-plz bumped versions.
  # release-plz release is a no-op if the local version already matches crates.io,
  # so it only publishes after a release PR merge bumps the version.
  # The tag triggers release.yml for binary builds.
  release:
    name: Publish & Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

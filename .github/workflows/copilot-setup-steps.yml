name: "Copilot Setup Steps"

# Run when this file changes to validate it, and allow manual testing.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be named exactly `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + nightly for coverage)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install system libraries (libgit2, OpenSSL)
        run: sudo apt-get update && sudo apt-get install -y libgit2-dev libssl-dev pkg-config

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Pre-fetch all Cargo dependencies
        run: cargo fetch
        env:
          CARGO_NET_RETRY: 10
          LIBGIT2_SYS_USE_PKG_CONFIG: "1"

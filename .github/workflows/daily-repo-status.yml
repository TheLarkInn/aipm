# Daily Repo Status — hand-spun GitHub Actions workflow
#
# Produces a daily issue summarising recent repo activity (issues, PRs,
# releases, code changes) using a sandboxed Copilot CLI agent.
#
# Reusable actions:
#   .github/actions/copilot-agent-setup         — install, safe outputs, MCP gateway
#   .github/actions/copilot-agent-run           — execute agent in AWF sandbox
#   .github/actions/copilot-agent-publish-issue — process safe outputs → create issue
#   .github/actions/copilot-agent-teardown      — stop gateway, upload artifacts

name: "Daily Repo Status"

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: "daily-repo-status"
  cancel-in-progress: false

env:
  SAFE_OUTPUTS_CONFIG: >-
    {"create_issue":{"close_older_issues":true,"labels":["report","daily-status"],"max":1,"title_prefix":"[repo-status] "},"noop":{"max":1,"report-as-issue":"true"}}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Copilot agent
        id: setup
        uses: ./.github/actions/copilot-agent-setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          copilot_token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          mcp_toolsets: "context,repos,issues,pull_requests"
          safe_outputs_config: ${{ env.SAFE_OUTPUTS_CONFIG }}

      - name: Run Copilot agent
        uses: ./.github/actions/copilot-agent-run
        with:
          copilot_token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          safe_outputs_path: ${{ steps.setup.outputs.safe_outputs_path }}
          prompt: >-
            Provide a daily repo status including the number of issues opened,
            pull requests opened, and pull requests closed. Make it in beautiful
            markdown. Make no mistakes.

      - name: Publish repo status issue
        if: success()
        uses: ./.github/actions/copilot-agent-publish-issue
        with:
          safe_outputs_config: ${{ env.SAFE_OUTPUTS_CONFIG }}
          title_prefix: "[repo-status]"
          labels: "report,daily-status"
          close_label: "daily-status"

      - name: Teardown Copilot agent
        if: always()
        uses: ./.github/actions/copilot-agent-teardown
        with:
          run_id: ${{ github.run_id }}
          artifact_name: "daily-status"

      - name: Create failure issue
        if: failure()
        run: |
          gh issue create \
            --title "[repo-status] Workflow failed $(date +%Y-%m-%d)" \
            --body "Daily repo status workflow failed. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug"

# Daily Repo Status — hand-spun GitHub Actions workflow
#
# Produces a daily issue summarising recent repo activity (issues, PRs,
# releases, code changes) using a sandboxed Copilot CLI agent.
#
# Reusable actions:
#   .github/actions/copilot-agent-setup   — pre-pull, install, start MCP gateway
#   .github/actions/copilot-agent-teardown — stop gateway, upload artifacts

name: "Daily Repo Status"

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: "daily-repo-status"
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── Reusable setup: pre-pull images, install CLI+AWF, start MCP gateway ─
      - name: Setup Copilot agent
        uses: ./.github/actions/copilot-agent-setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          copilot_token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          mcp_toolsets: "context,repos,issues,pull_requests"

      # ── Agent execution (sandboxed inside AWF network firewall) ─────────────
      - name: Run Copilot agent
        id: agent
        timeout-minutes: 20
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_AW_MCP_CONFIG:     /home/runner/.copilot/mcp-config.json
          GITHUB_STEP_SUMMARY:  /tmp/gh-aw/agent-step-summary.md
        run: |
          set -o pipefail
          touch /tmp/gh-aw/agent-step-summary.md

          sudo -E awf \
            --env-all \
            --container-workdir "$GITHUB_WORKSPACE" \
            --allow-domains "api.github.com,api.githubcopilot.com,api.business.githubcopilot.com,api.enterprise.githubcopilot.com,api.individual.githubcopilot.com,github.com,host.docker.internal,raw.githubusercontent.com,registry.npmjs.org,telemetry.enterprise.githubcopilot.com" \
            --log-level info \
            --proxy-logs-dir /tmp/gh-aw/firewall-logs \
            --enable-host-access \
            --image-tag 0.25.0 \
            --skip-pull \
            --enable-api-proxy \
            -- /bin/bash -c \
              '/usr/local/bin/copilot \
                --add-dir "$GITHUB_WORKSPACE" \
                --disable-builtin-mcps \
                --allow-all-tools \
                --allow-all-paths \
                --log-level all \
                --log-dir /tmp/gh-aw/agent-logs \
                --prompt "Provide a daily repo status include the number of issues opened, pull requests opened, and pull requests closed. Make it in beautiful markdown. Make no mistakes."' \
            2>&1 | tee /tmp/gh-aw/agent-stdio.log

      # ── Publish the agent's output as a repo issue ───────────────────────────
      - name: Create repo status issue
        if: success()
        run: |
          # Close any open issues from prior runs
          gh issue list \
            --label "daily-status" \
            --state open \
            --json number \
            --jq '.[].number' \
          | while read -r n; do
              gh issue close "$n" --comment "Superseded by new daily status report"
            done

          # Strip AWF/container bootstrap noise, keep only the agent's output
          BODY=$(grep -v -E '^\[(WARN|INFO|SUCCESS|ERROR|entrypoint|health-check)\]|^ Container awf-|^Process exiting|^Total usage|^API time|^Total session|^Total code|^Breakdown by' /tmp/gh-aw/agent-stdio.log | tail -c 60000)
          DATE=$(date +%Y-%m-%d)
          gh issue create \
            --title "[repo-status] Daily Status ${DATE}" \
            --body "${BODY}" \
            --label "report,daily-status"

      # ── Reusable teardown: stop gateway, upload artifacts, firewall summary ──
      - name: Teardown Copilot agent
        if: always()
        uses: ./.github/actions/copilot-agent-teardown
        with:
          run_id: ${{ github.run_id }}
          artifact_name: "daily-status"

      # ── Failure notice ────────────────────────────────────────────────────────
      - name: Create failure issue
        if: failure()
        run: |
          gh issue create \
            --title "[repo-status] Workflow failed $(date +%Y-%m-%d)" \
            --body "Daily repo status workflow failed. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug"

# Publish aipm to nuget.org as a multi-RID native package.
#
# Posture (after issue #793 Finding 3):
#   - OIDC trusted publishing ONLY. No long-lived NUGET_API_KEY fallback.
#   - Job bound to a protected GitHub `environment: nuget-publish` with
#     required-reviewer approval. Both release-triggered and manual
#     dispatches pause until a human approves.
#   - Build provenance attested with sigstore via
#     actions/attest-build-provenance@v1; consumers can verify with
#     `gh attestation verify out/aipm.<version>.nupkg --owner TheLarkInn`.
#
# Triggers:
#   - release: [published]  -- automatic stable publish on every aipm-v<semver>
#                              GitHub Release (guarded by !prerelease)
#   - workflow_dispatch     -- manual republish (gated by environment reviewer)
#
# Rollback: nuget.org does not allow package deletion, only unlisting. See
# RELEASING.md for the broken-version runbook.

name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., aipm-v0.22.3). Must already have a published GitHub Release with platform archives.'
        required: true
        type: string

concurrency:
  group: release-nuget-${{ inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Pack & push aipm to nuget.org
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || (github.event_name == 'release'
              && startsWith(github.event.release.tag_name, 'aipm-v')
              && !github.event.release.prerelease) }}
    runs-on: ubuntu-latest
    # Protected environment with required-reviewer approval. Configured in
    # repo Settings -> Environments -> nuget-publish (#793 Finding 3 / G6).
    environment: nuget-publish
    permissions:
      contents: read
      id-token: write       # required for NuGet Trusted Publishing (OIDC)
      attestations: write   # required for actions/attest-build-provenance
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve tag and version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$EVENT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag resolved from workflow_dispatch input or release event"
            exit 1
          fi
          case "$TAG" in
            aipm-v*) ;;
            *) echo "::error::Tag '$TAG' does not start with 'aipm-v'"; exit 1 ;;
          esac
          VERSION="${TAG#aipm-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag='$TAG' version='$VERSION'"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p archives
          gh release download "${{ steps.ver.outputs.tag }}" \
            --pattern 'aipm-*.tar.xz' \
            --pattern 'aipm-*.zip' \
            --dir archives \
            --repo "${{ github.repository }}"
          ls -la archives

      - name: Unpack into runtimes/<RID>/native layout
        run: |
          set -euo pipefail
          mkdir -p pkg/runtimes
          declare -A RID_MAP=(
            [x86_64-unknown-linux-gnu]=linux-x64
            [x86_64-apple-darwin]=osx-x64
            [aarch64-apple-darwin]=osx-arm64
            [x86_64-pc-windows-msvc]=win-x64
          )
          for triple in "${!RID_MAP[@]}"; do
            rid="${RID_MAP[$triple]}"
            mkdir -p "pkg/runtimes/$rid/native"
            if [[ "$triple" == *windows* ]]; then
              archive="archives/aipm-${triple}.zip"
              test -f "$archive" || { echo "::error::Missing $archive"; exit 1; }
              # cargo-dist's Windows zip is FLAT (aipm.exe at archive root), while
              # Unix tarballs use a subdirectory. Pattern '*aipm.exe' matches both
              # flat and nested layouts so we're robust against future changes.
              unzip -j "$archive" '*aipm.exe' -d "pkg/runtimes/$rid/native/"
            else
              archive="archives/aipm-${triple}.tar.xz"
              test -f "$archive" || { echo "::error::Missing $archive"; exit 1; }
              mkdir -p "/tmp/unpack-$rid"
              tar -xf "$archive" --strip-components=1 -C "/tmp/unpack-$rid"
              install -m 755 "/tmp/unpack-$rid/aipm" "pkg/runtimes/$rid/native/aipm"
            fi
          done
          cp README.md LICENSE pkg/
          echo "Staged runtimes/ tree:"
          find pkg/runtimes -type f -printf '%p (%s bytes)\n'

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Set up NuGet CLI
        uses: nuget/setup-nuget@v2

      - name: Install mono (nuget.exe runtime on Linux)
        # ubuntu-latest (24.04) no longer ships mono pre-installed, but
        # nuget.exe is a .NET Framework binary that requires it. Installing
        # mono-devel (~200 MB, ~20 s) covers the System.Net.Http assemblies
        # nuget pack / push need. Forward-looking alternative: migrate to
        # `dotnet pack` + stub csproj once .NET 10's -p:NuspecFile stabilizes.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mono-devel
          mono --version | head -1

      - name: Pack
        working-directory: pkg
        run: |
          set -euo pipefail
          # -BasePath . tells nuget.exe to resolve <file src="..."> entries
          # against CWD (pkg/) instead of the directory containing the nuspec
          # (packaging/). Without this, nuget looks for packaging/runtimes/*
          # and fails with "Could not find a part of the path".
          nuget pack ../packaging/aipm.nuspec \
            -Version "${{ steps.ver.outputs.version }}" \
            -Properties "version=${{ steps.ver.outputs.version }};commit=${{ github.sha }}" \
            -BasePath . \
            -NoDefaultExcludes \
            -NonInteractive \
            -OutputDirectory ../out

      - name: Inspect nupkg (sanity check)
        run: |
          set -euo pipefail
          ls -la out/
          nupkg="out/aipm.${{ steps.ver.outputs.version }}.nupkg"
          test -f "$nupkg" || { echo "::error::nupkg not produced at $nupkg"; exit 1; }
          echo "Contents of $nupkg:"
          unzip -l "$nupkg"
          runtime_count=$(unzip -l "$nupkg" | grep -cE '^\s+[0-9]+.*runtimes/.*/native/aipm(\.exe)?$')
          if [ "$runtime_count" -lt 4 ]; then
            echo "::error::Expected at least 4 runtimes/<RID>/native/aipm[.exe] entries, found $runtime_count"
            exit 1
          fi
          echo "Found $runtime_count runtimes/<RID>/native/aipm[.exe] entries (>=4 required)"

      - name: Generate build provenance attestation
        # SLSA v1 build provenance signed by sigstore. Verifiable with
        # `gh attestation verify out/aipm.<version>.nupkg --owner TheLarkInn`
        # (#793 Finding 3 / G6). Issued AFTER pack so the attestation
        # subject is the exact byte-for-byte .nupkg that gets published.
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: out/*.nupkg

      - name: NuGet OIDC login (Trusted Publishing)
        # `continue-on-error: true` was removed in #793 Finding 3 along
        # with the NUGET_API_KEY fallback step. A failed OIDC exchange
        # now aborts the job — there is no shared-secret recovery path.
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USERNAME }}

      - name: Push to nuget.org (OIDC)
        run: |
          dotnet nuget push out/*.nupkg \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
